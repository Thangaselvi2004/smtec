directories:
  data: "data"
  models: "models"
  src: "src"

files:
  dataset: "student_performance.csv"
  model: "student_performance_model.pkl"
  scaler: "scaler.pkl"

features:
  numerical: 
    - "StudyHours"
    - "SleepHours"
    - "PreviousGrade"
    - "Participation"
  categorical: []
  target: "FinalGrade"

model_params:
  random_forest:
    n_estimators: 200
    max_depth: 20
    random_state: 42
  xgboost:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
    random_state: 42

app:
  title: "Student Performance AI"
  theme: "light"
