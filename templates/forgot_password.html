<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SMTEC EduPredict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f1f5f9 0%, #e0e7ff 100%);
            padding: 40px 20px;
        }
        .flash-container {
            position: fixed; top: 20px; right: 20px; z-index: 2000; max-width: 420px;
        }
        .alert {
            padding: 15px 25px; border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); font-weight: 700; font-size: 0.88rem;
            min-width: 300px; animation: slideIn 0.3s ease;
        }
        .alert-success { background: #dcfce7; color: #166534; border-left: 5px solid #22c55e; }
        .alert-error { background: #fee2e2; color: #991b1b; border-left: 5px solid #ef4444; }
        .alert-warning { background: #fef9c3; color: #854d0e; border-left: 5px solid #eab308; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .gradient-btn {
            background: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
            color: white; border: none; padding: 16px; font-size: 0.95rem;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; border-radius: 12px; transition: all 0.3s;
            width: 100%; margin-bottom: 25px;
        }
        .gradient-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body>
    <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category not in ['message'] else 'success' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div style="width: 100%; max-width: 450px; background: #ffffff; padding: 50px; border-radius: 32px; border: 1px solid #e5e7eb; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center;">
        <div style="margin-bottom: 30px;">
            <h1 style="color: #111827; font-size: 1.8rem; font-weight: 800; margin-bottom: 10px;">Reset Password</h1>
            <p style="color: #6b7280; font-size: 0.95rem;">Enter your details to secure your account</p>
        </div>

        <form method="POST">
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #374151; margin-bottom: 8px;">Email Address</label>
                <input type="email" name="email" required placeholder="Enter your registered email" 
                       style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d5db; background: #f9fafb; font-size: 0.95rem; outline: none; font-family: inherit;">
            </div>

            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #374151; margin-bottom: 8px;">Date of Birth</label>
                <input type="date" name="dob" required 
                       style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d5db; background: #f9fafb; font-size: 0.95rem; outline: none; font-family: inherit;">
            </div>

            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #374151; margin-bottom: 8px;">New Password</label>
                <input type="password" name="new_password" required placeholder="••••••••" 
                       style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d5db; background: #f9fafb; font-size: 0.95rem; outline: none; font-family: inherit;">
            </div>

            <div style="text-align: left; margin-bottom: 30px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #374151; margin-bottom: 8px;">Confirm Password</label>
                <input type="password" name="confirm_password" required placeholder="••••••••" 
                       style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d5db; background: #f9fafb; font-size: 0.95rem; outline: none; font-family: inherit;">
            </div>

            <button type="submit" class="gradient-btn">Update Password</button>
        </form>

        <a href="{{ url_for('login') }}" style="color: #6366f1; font-weight: 700; text-decoration: none; font-size: 0.9rem;">Back to Login</a>
    </div>
</body>
</html>
